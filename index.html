<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארכיון הפילוסופיה האלטרנטיבית - 1988</title>
    <style>
        body {
            background-color: #121212;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #1a1a1a 10%, #000 90%);
        }

        .menu-container {
            border: 4px solid #00ff00;
            padding: 40px;
            background: #000;
            box-shadow: 0 0 20px #00ff00;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a {
            color: #000;
            background: #00ff00;
            text-decoration: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        a:hover {
            background: #000;
            color: #00ff00;
            border-color: #00ff00;
            transform: scale(1.05);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #006600;
        }

        /* Glitch effect */
        .glitch {
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% { opacity: 1; }
            50% { opacity: 0.8; transform: skew(1deg); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1 class="glitch">ארכיון המחשבה הקיצונית</h1>
        <div class="links">
            <a href="hotdog.html">🌭 אסכולת הנקניקייה הצפה</a>
            <a href="airport.html">🚀 דוקטרינת "אם אני לא טס"</a>
        </div>
        <p class="footer-note">בחר נושא כדי להתחיל בסריקת נתונים...</p>
    </div>

</body>
</html>
